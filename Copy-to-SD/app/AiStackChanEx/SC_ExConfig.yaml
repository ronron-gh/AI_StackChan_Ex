## アプリ固有の設定ファイル
# AI機能 (LLM, TTS, STT, Wakeword)
llm:
  type: 0                            # 0:ChatGPT  1:ModuleLLM  2:ModuleLLM(Function Calling)  3:Gemini(Realtime)  4:OpenAI Compatible HTTP Endpoint
  model: ""                          # ChatGPT(type 0): 空欄なら gpt-4o、指定すればそのモデル名で上書き。OpenAI互換エンドポイント(type 4): 指定必須(空欄ならリクエストは拒否されます)。
  #model: "gpt-4o-mini"               # 例: ChatGPT(type 0) で gpt-4o 以外を使う場合
  #model: "llama-3.1-8b-instruct"     # 例: OpenAI互換エンドポイント(type 4) のモデル名
  #customEndpoint: "http://192.168.X.XXX:8080/v1/chat/completions"   # http:// (平文) は customRootCAFile 不要
  #customEndpoint: "https://my-llm.example.com/v1/chat/completions"  # https:// は下の customRootCAFile が必須 (未指定ならリクエストは拒否されます)
  # customRootCAFile / customRootCAFiles は https:// の customEndpoint を使う場合のみ必要です。
  # SD カードに PEM 形式のルート CA をテキストファイルとして置き、そのパスを指定してください。
  # ファイル例 (例: SD カードのルートに customRootCA.pem として保存):
  #   -----BEGIN CERTIFICATE-----
  #   MIIDdzCCAl+gAwIBAgIEAgAAuTANBgkqh...      (改行を保持した Base64 本文)
  #   -----END CERTIFICATE-----
  # ルート CA が 1 つの場合は customRootCAFile に単一のパスを指定します。
  #customRootCAFile: "/customRootCA.pem"
  # 複数のルート CA を信頼させたい場合は customRootCAFiles にパスの一覧を指定します。
  # (各ファイルの中身は連結され、すべての証明書がルート CA として信頼されます。)
  # customRootCAFile と customRootCAFiles は併用可能です(両方の証明書が読み込まれます)。
  #customRootCAFiles:
  #  - "/customRootCA.pem"
  #  - "/customRootCA2.pem"

tts:
  type: 0                            # 0:VOICEVOX  1:ElevenLabs  2:OpenAI TTS  3:AquesTalk 4:ModuleLLM
  model: ""                          # VOICEVOX, AquesTalk (modelは未対応)
  #model: "eleven_multilingual_v2"    # ElevenLabs
  #model: "tts-1"                     # OpenAI TTS
  #model: "melotts-ja-jp"             # ModuleLLM (日本語)  ※モデル指定なしの場合は英語
  voice: "3"                         # VOICEVOX (ずんだもん)
  #voice: "AZnzlk1XvdvUeBnXmlld"      # ElevenLabs
  #voice: "alloy"                     # OpenAI TTS
  #voice: ""                          # AquesTalk, ModuleLLM (voiceは未対応)

stt:
  type: 0                            # 0:Google STT  1:OpenAI Whisper  2:ModuleLLM(ASR)  3:ModuleLLM(Whisper)

wakeword:
  type: 0                            # 0:SimpleVox  1:ModuleLLM(KWS)
  keyword: ""                        # SimpleVox (初期設定は不可。ボタンB長押しで登録)
  #keyword: "HI STUCK"                # ModuleLLM(KWS)

# ModuleLLM
moduleLLM:
  # Serial Pin
  # Core2 Rx:13,Tx:14
  # CoreS3 Rx:18,Tx:17
  rxPin: 13
  txPin: 14

