<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI Stack-chan Ex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    main { text-align: center; max-width: 30em; padding: 2em; }
    h1 { font-size: 2em; margin: 0 0 0.3em; }
    p.sub { opacity: 0.85; margin: 0 0 2em; }
    .menu { display: grid; gap: 1em; }
    a.tile {
      display: block; padding: 1.2em 1em;
      background: rgba(255,255,255,0.15);
      border-radius: 10px; backdrop-filter: blur(6px);
      color: #fff; text-decoration: none; font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    a.tile:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }
    a.tile .icon { font-size: 1.6em; display: block; margin-bottom: 0.2em; }
    a.tile .desc { display: block; font-size: 0.85em; font-weight: 400; opacity: 0.85; margin-top: 0.2em; }
  </style>
</head>
<body>
  <main>
    <h1>🤖 AI Stack-chan Ex</h1>
    <p class="sub">Web Console</p>
    <div class="menu">
      <a class="tile" href="/dashboard.html">
        <span class="icon">📊</span>
        Dashboard
        <span class="desc">稼働状況・設定の確認</span>
      </a>
      <a class="tile" href="/personalize.html">
        <span class="icon">🤖</span>
        Personalize
        <span class="desc">カスタム指示・メモリの設定</span>
      </a>
      <a class="tile" href="/settings.html">
        <span class="icon">⚙️</span>
        Settings
        <span class="desc">YAML 設定ファイルの編集</span>
      </a>
      <a class="tile" href="/present.html">
        <span class="icon">🎤</span>
        Present
        <span class="desc">テキスト入力で発話・プレゼンモード</span>
      </a>
    </div>
  </main>
</body>
</html>
